name: Publish to NPM

# Controls when the action will run.
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  id-token: write # Required for OIDC
  contents: read

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Prepare Environment
        run: |
          corepack enable
          yarn install --immutable
          yarn build
        env:
          CI: true
      - name: Run lint
        run: |
          yarn lint
        env:
          CI: true

  test:
    name: Test on node ${{ matrix.node_version }} and ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node_version: ['22', '24']
        os: [ubuntu-latest] # [windows-latest, macOS-latest]
    timeout-minutes: 10
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node_version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node_version }}
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-modules-${{ hashFiles('**/yarn.lock') }}

      - name: Prepare Environment
        if: matrix.node_version != 10
        run: |
          yarn install --immutable
          yarn build
        env:
          CI: true
      - name: Prepare Environment (Node 10)
        if: matrix.node_version == 10
        run: |
          sudo apt-get update
          sudo apt-get install libudev-dev

          # yarn --prod

          yarn --ignore-engines
          yarn build
        env:
          CI: true

      - name: Run unit tests
        run: |
          yarn test
        env:
          CI: true


  publish:
    name: Publish to NPM
    needs:
      - lint
      - test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # scoped for as short as possible, as this gives write access to npm
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Prepare Environment
        run: |
          corepack enable
          yarn install --immutable
        env:
          CI: true

      # - name: Determine type of release
      #   id: release-tag
      #   run: |
      #     if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
      #       echo "Publish latest"
      #       echo "tag=latest" >> $GITHUB_OUTPUT
      #     else
      #       echo "Publish nightly"
      #       echo "tag=nightly" >> $GITHUB_OUTPUT
      #     fi

      # - name: Bump version to prerelease
      #   if: github.ref != 'refs/heads/main'
      #   run: |
      #     COMMIT_TIMESTAMP=$(git log -1 --pretty=format:%ct HEAD)
      #     COMMIT_DATE=$(date -d @$COMMIT_TIMESTAMP +%Y%m%d-%H%M%S)
      #     GIT_HASH=$(git rev-parse --short HEAD)
      #     PRERELEASE_TAG=0.0.0-nightly-$(echo "${{ github.ref_name }}" | sed -r 's/[^a-z0-9]+/-/gi')
      #     yarn lerna:version $PRERELEASE_TAG-$COMMIT_DATE-$GIT_HASH --force-publish=* --no-changelog --no-push --no-git-tag-version --yes

      - name: Build
        run: yarn build
        env:
          CI: true

      - name: Publish to NPM (latest)
        if: github.ref == 'refs/heads/main'
        run: yarn lerna:publish from-package --no-verify-access --yes
        env:
          CI: true

      - name: Publish to NPM (nightly)
        if: github.ref != 'refs/heads/main'
        run: |
          COMMIT_TIMESTAMP=$(git log -1 --pretty=format:%ct HEAD)
          COMMIT_DATE=$(date -d @$COMMIT_TIMESTAMP +%Y%m%d-%H%M%S)
          GIT_HASH=$(git rev-parse --short HEAD)
          PRERELEASE_TAG=nightly-$(echo "${{ github.ref_name }}" | sed -r 's/[^a-z0-9]+/-/gi')
          yarn lerna:publish from-package --no-verify-access --canary --force-publish --no-git-reset --preid $PRERELEASE_TAG-$COMMIT_DATE-$GIT_HASH --dist-tag nightly --yes
        env:
          CI: true
